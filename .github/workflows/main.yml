name: CI Pipeline

on:
  push:
    branches: [ "main" ] # Se activa al hacer push a la rama main

jobs:
  # --- ACCIÓN 1: Linter (Calidad de código) ---
  lint:
    name: Check Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Super-Linter
        uses: github/super-linter@v5
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- ACCIÓN 2: Build & Push a Docker Hub ---
  build-and-push:
    name: Build and Push Docker Image
    needs: lint # Solo se ejecuta si el linter pasa con éxito
    runs-on: ubuntu-latest
    
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Docker Hub credentials
        run: |
          if [ -z "$DOCKER_USERNAME" ]; then
            echo "❌ Error: DOCKER_USERNAME secret is not set in the repository settings."
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/mi-app-docker:latest
