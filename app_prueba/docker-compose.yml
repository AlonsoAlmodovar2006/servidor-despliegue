version: "3.8"
services:
  mi-web:
    image: nginxdemos/hello:plain-text
    container_name: app-hola-mundo
    restart: unless-stopped
    environment:
      # Usa tu subdominio de Cloudflare para acceso desde internet
      - VIRTUAL_HOST=hola.tudominio.dpdns.org
      # O usa nip.io para acceso solo en red local:
      # - VIRTUAL_HOST=hola.${SERVER_IP}.nip.io
      - VIRTUAL_PORT=80
    networks:
      - proxy

networks:
  proxy:
    external: true
    